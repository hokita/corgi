name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          # Firebase client config is public-facing — security enforced by Firebase Security Rules, not by keeping keys secret.
          VITE_FIREBASE_API_KEY: AIzaSyCwAA7MJGTsn6wNMsJrPwSj_Lt3d4Sx2Ho
          VITE_FIREBASE_AUTH_DOMAIN: corgi-8732c.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: corgi-8732c
          VITE_API_URL: https://corgi-backend-838648453884.asia-northeast1.run.app
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: corgi-8732c
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@15.22.1 deploy --only hosting --project corgi-8732c --non-interactive
