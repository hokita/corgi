name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Test
        working-directory: backend
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          BUILD_ID=$(gcloud builds submit backend/ \
            --tag asia-northeast1-docker.pkg.dev/corgi-8732c/corgi/backend:latest \
            --async \
            --format='value(id)')
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [[ "$STATUS" =~ ^(FAILURE|TIMEOUT|CANCELLED|INTERNAL_ERROR)$ ]]; then
              echo "Build failed: $STATUS"; exit 1
            fi
            sleep 15
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy corgi-backend \
            --image asia-northeast1-docker.pkg.dev/corgi-8732c/corgi/backend:latest \
            --region asia-northeast1 \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }},FIREBASE_PROJECT_ID=corgi-8732c,FRONTEND_URL=https://corgi-8732c.web.app" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"
